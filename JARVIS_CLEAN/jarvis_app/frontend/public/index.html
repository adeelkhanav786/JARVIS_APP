<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#05050f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>J.A.R.V.I.S.</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#7c3aed;--cyan:#06b6d4;--glow:rgba(124,58,237,0.5);--bg:#05050f;--text:#e2e0ff}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}
    #bg{position:fixed;inset:0;z-index:0}
    .grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:50px 50px}
    .page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:20px}
    .orb{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#fff;box-shadow:0 0 80px var(--glow),0 0 150px rgba(6,182,212,.15);animation:pulse 3s ease-in-out infinite;margin-bottom:10px}
    @keyframes pulse{0%,100%{box-shadow:0 0 80px var(--glow)}50%{box-shadow:0 0 120px var(--glow),0 0 200px rgba(6,182,212,.2)}}
    h1{font-family:'Orbitron',monospace;font-size:clamp(24px,6vw,42px);letter-spacing:6px;font-weight:900}
    h1 span{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{font-size:14px;color:#6b6490;max-width:320px;line-height:1.8;letter-spacing:1px}
    .btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
    .btn{padding:14px 32px;border-radius:12px;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;border:none;box-shadow:0 4px 24px var(--glow)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
    .btn-secondary{background:transparent;color:var(--text);border:1px solid rgba(124,58,237,.4)}
    .btn-secondary:hover{border-color:var(--accent);background:rgba(124,58,237,.1)}
    #installBtn{display:none}
    .version{font-size:10px;color:#3d3a55;letter-spacing:2px;margin-top:10px}
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="grid"></div>
<div class="page">
  <div class="orb">J</div>
  <h1>J.A.R.V.I.S<span>.</span></h1>
  <p>Just A Rather Very Intelligent System — Your AI assistant, always ready.</p>
  <div class="btns">
    <a class="btn btn-primary" id="mainBtn" href="login.html">⚡ GET STARTED</a>
    <button class="btn btn-secondary" id="installBtn" onclick="showInstallPrompt()">📲 INSTALL APP</button>
  </div>
  <div class="version">VERSION 2.0 · PWA READY</div>
</div>
<script src="app.js"></script>
<script>
  // Particle canvas
  (function(){
    const c=document.getElementById('bg'),ctx=c.getContext('2d');let W,H,pts=[];
    function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];for(let i=0;i<60;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.5+.5})}
    resize();window.addEventListener('resize',resize);
    function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(124,58,237,0.7)';ctx.fill()});pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<130){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(124,58,237,${.12*(1-d/130)})`;ctx.stroke()}}));requestAnimationFrame(draw)}
    draw();
  })();
  // Redirect if logged in
  if(localStorage.getItem('jarvis_user')) document.getElementById('mainBtn').href='chat.html';
</script>
</body>
</html>
